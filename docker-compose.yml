services:
  postgres:
    image: postgres:16-alpine
    container_name: decisio_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: decisio_app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: decisio_frontend
    depends_on:
      - app
    restart: unless-stopped
    volumes:
      # Semana 3: bind mount de solo lectura sobre frontend/public/brand/.
      # Nginx sirve archivos estáticos directo de disco en cada request —
      # reemplazar frontend/public/brand/logo-io.svg en el VPS se refleja
      # de inmediato con un refresh del navegador, SIN docker compose
      # up -d --build. El resto del sitio (JS/CSS bundleados, index.html)
      # sigue viniendo de la imagen — solo esta carpeta específica queda
      # editable en caliente. `:ro` porque nginx nunca necesita escribir ahí.
      - ./frontend/public/brand:/usr/share/nginx/html/brand:ro
    networks:
      - default
      - escai-network

volumes:
  postgres_data:

networks:
  escai-network:
    external: true
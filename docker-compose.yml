version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: decisio_db
    environment:
      POSTGRES_USER: decisio
      POSTGRES_PASSWORD: decisio
      POSTGRES_DB: decisio
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisio"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: decisio_app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
